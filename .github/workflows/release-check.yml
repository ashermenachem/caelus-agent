name: Release verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install release-check prerequisites
        run: python -m pip install --upgrade pip setuptools pytest
      - name: Build and validate release artifact
        run: PYTHON=python bash scripts/release-check.sh
      - name: Upload verified wheel
        uses: actions/upload-artifact@v4
        with:
          name: caelus-terminal-wheel
          path: dist/caelus_terminal-*.whl
          if-no-files-found: error
